replicaCount: 1

image:
  repository: anibalvelarde/patient-care-ui-vue
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 80
  nodePort: 31000

namespace: nc-k3s

apiBaseUrl: http://neurocorp.k3s:30000

healthChecks:
  enabled: true
  path: /
  initialDelaySeconds: 5
  periodSeconds: 10
