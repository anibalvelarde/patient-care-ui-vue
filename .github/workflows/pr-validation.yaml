name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-ui/package-lock.json

      - name: Install dependencies
        working-directory: app-ui
        run: npm ci

      - name: Type-check
        working-directory: app-ui
        run: npx vue-tsc --noEmit

      - name: Lint
        working-directory: app-ui
        run: npm run lint
