name: Build, Push, and Deploy

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-ui/package-lock.json

      - name: Install dependencies
        working-directory: app-ui
        run: npm ci

      - name: Type-check
        working-directory: app-ui
        run: npx vue-tsc --noEmit

      - name: Lint
        working-directory: app-ui
        run: npm run lint

  docker-push:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: true
          build-args: |
            BUILD_VERSION=${{ github.run_number }}
          tags: |
            anibalvelarde/patient-care-ui-vue:latest
            anibalvelarde/patient-care-ui-vue:${{ github.run_number }}

  s3-deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app-ui/package-lock.json

      - name: Install dependencies
        working-directory: app-ui
        run: npm ci

      - name: Build SPA
        working-directory: app-ui
        run: npm run build

      - name: Generate runtime config for S3
        run: |
          cat <<'EOF' > app-ui/dist/config.js
          window.__APP_CONFIG__ = {
            apiBaseUrl: "https://neurocorp.anibalvelarde.com"
          };
          EOF

      - name: Deploy to S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync files to S3
        run: aws s3 sync app-ui/dist/ s3://neurocorp --delete
